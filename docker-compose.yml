version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_crop_advisory
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-crop-net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - smart-crop-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/smart_crop_advisory
      REDIS_URL: redis://redis:6379
      ADVISORY_ENGINE_URL: http://advisory-engine:8001
      VISION_ENGINE_URL: http://vision-engine:8002
    networks:
      - smart-crop-net

  advisory-engine:
    build:
      context: ./advisory-engine
      dockerfile: Dockerfile
    depends_on:
      - postgres
    networks:
      - smart-crop-net

  vision-engine:
    build:
      context: ./vision-engine
      dockerfile: Dockerfile
    networks:
      - smart-crop-net

volumes:
  postgres_data:

networks:
  smart-crop-net:
    driver: bridge
