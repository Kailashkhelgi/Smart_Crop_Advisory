version: '3.9'

# Java-based Docker Compose — replaces the Node.js/Python services with Spring Boot

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_crop_advisory
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-crop-net

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - smart-crop-net

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    env_file:
      - ./backend-java/.env
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
      - advisory-engine
      - vision-engine
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/smart_crop_advisory
      DB_USERNAME: user
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379
      ADVISORY_ENGINE_URL: http://advisory-engine:8001
      VISION_ENGINE_URL: http://vision-engine:8002
    networks:
      - smart-crop-net

  advisory-engine:
    build:
      context: ./advisory-engine-java
      dockerfile: Dockerfile
    networks:
      - smart-crop-net

  vision-engine:
    build:
      context: ./vision-engine-java
      dockerfile: Dockerfile
    networks:
      - smart-crop-net

volumes:
  postgres_data:

networks:
  smart-crop-net:
    driver: bridge
