# Server
server.port=${PORT:3000}
spring.application.name=smart-crop-advisory

# Database — set DATABASE_URL, DB_USERNAME, DB_password as environment variables in Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — runs migrations automatically on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# JWT
app.jwt.secret=${JWT_SECRET:smart_crop_advisory_jwt_secret_dev_2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# External services (use real keys in production)
app.advisory-engine.url=${ADVISORY_ENGINE_URL:http://localhost:8001}
app.vision-engine.url=${VISION_ENGINE_URL:http://localhost:8002}
app.otp.provider.api-key=${OTP_PROVIDER_API_KEY:dev_key}
app.otp.provider.sender-id=${OTP_PROVIDER_SENDER_ID:SMCROP}
app.weather.api-key=${OPENWEATHERMAP_API_KEY:dev_key}
app.market.api-key=${MARKET_PRICE_API_KEY:dev_key}
app.market.api-url=${MARKET_PRICE_API_URL:https://api.agmarknet.gov.in}
app.google.api-key=${GOOGLE_CLOUD_API_KEY:dev_key}
app.fcm.server-key=${FCM_SERVER_KEY:dev_key}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger UI
springdoc.swagger-ui.path=/api/docs
springdoc.api-docs.path=/api/docs/openapi

# Logging — show OTP in console for dev
logging.level.com.smartcrop=INFO

# Jackson — serialize Java 8 date/time types
spring.jackson.serialization.write-dates-as-timestamps=false
